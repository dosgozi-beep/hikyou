<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hidden Japan - 日本の秘境マップ</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Noto+Serif+JP:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header Overlay -->
    <header class="glass-panel main-header">
        <h1>✨ 発見！日本の秘境マップ ✨</h1>
        <p>キミも今日から絶景ハンターになろう！</p>
        <button id="open-diagnosis" class="primary-btn" style="margin-top: 1rem; width: auto; padding: 0.5rem 1rem; box-shadow: none;">🎯 あなたにピッタリの秘境を診断！</button>
    </header>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Spot Detail Overlay (Hidden by default) -->
    <aside id="spot-panel" class="glass-panel spot-panel hidden">
        <button id="close-panel" class="close-btn">&times;</button>
        <div class="spot-hero">
            <img id="spot-image" src="" alt="Spot Image">
            <div class="spot-title-wrapper">
                <h2 id="spot-title">スポット名</h2>
                <div class="status-badge" id="spot-status">未到達</div>
            </div>
        </div>
        <div class="spot-content">
            <p id="spot-description">ここに秘境の説明が入ります。</p>

            <div class="distance-info">
                <span>現在地からの距離:</span>
                <span id="spot-distance">計算中...</span>
            </div>

            <!-- Interaction Area -->
            <div class="interaction-area">
                <div id="unlock-message" class="locked-msg">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    <p>このスポットに到達すると、感想を残すことができます。また、他の旅行者が残した過去の記録を開放できます。</p>
                </div>

                <div id="action-form" class="hidden">
                    <h3>記録を残す</h3>
                    <textarea id="comment-input" placeholder="この絶景の感想を綴ってください..."></textarea>
                    <button class="primary-btn" id="submit-comment">証を刻む</button>
                </div>
            </div>

            <!-- Comments Area -->
            <div class="comments-section">
                <h3>過去の旅人の声 (翌日以降公開)</h3>
                <div id="comments-list" class="comments-list">
                    <!-- Comments will be injected here -->
                </div>
            </div>
        </div>
    </aside>

    <!-- Debug/Admin Controls (For Prototype) -->
    <div class="glass-panel debug-panel">
        <div class="debug-header">
            <h4>[PROTOTYPE] 神の目 (デバッグ)</h4>
            <span class="pulse-dot"></span>
        </div>
        <div class="debug-controls">
            <div class="control-group">
                <label>現在地の偽装:</label>
                <select id="mock-location">
                    <option value="none">実際の現在地を使用</option>
                    <!-- Spot options injected by JS -->
                </select>
            </div>
        </div>
    </div>

    <!-- Event Banner (Bottom Center) -->
    <div class="glass-panel event-banner">
        <div class="event-info">
            <strong>🏕️ 秘境ふぁんミーティング 2026！</strong> <span class="badge">🔥 参加者大募集中！</span>
            <p>日程: 2026年5月15日 | 会場: 関東近郊キャンプ場でお肉を焼こう！</p>
        </div>
        <button class="secondary-btn" style="width: auto; padding: 0.5rem 1.5rem; flex-shrink: 0;" onclick="alert('詳細ページは現在準備中です。')">詳細・エントリー</button>
    </div>

    <!-- Diagnosis Modal -->
    <div id="diagnosis-modal" class="modal-overlay hidden">
        <div class="glass-panel modal-content">
            <button id="close-diagnosis" class="close-btn">&times;</button>
            <div id="quiz-container">
                <h2 id="q-title">🎯 ワクワク秘境診断！</h2>
                <p id="q-text" class="q-text" style="margin-top: 1rem; margin-bottom: 2rem; font-size: 1.1rem; color: #333;">今の気分で直感で答えてね！</p>
                <div class="answers" id="answers" style="display: flex; flex-direction: column; gap: 1rem;">
                    <button class="primary-btn" id="start-quiz">診断を始める！</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- App JS -->
    <script src="app.js"></script>
</body>
</html>
